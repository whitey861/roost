name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: denoland/setup-deno@v1
        with:
          deno-version: v2.x

      - name: Install dependencies
        run: npm ci

      - name: Runtime parity check
        run: npm run check:parity

      - name: TypeScript type check (Node)
        run: npm run typecheck

      - name: TypeScript type check (Edge Functions, Deno)
        run: npm run typecheck:edge

      - name: Tests
        run: npm test
